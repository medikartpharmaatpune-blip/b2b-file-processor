apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-processor
  labels:
    app: {{ .Release.Name }}-processor
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-processor
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-processor
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: processor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              value: "{{ .Values.config.projectId }}"
            - name: PUBSUB_SUBSCRIPTION
              value: "{{ .Values.config.pubsubSubscription }}"
            - name: INPUT_BUCKET
              value: "{{ .Values.config.inputBucket }}"
            - name: OUTPUT_BUCKET
              value: "{{ .Values.config.outputBucket }}"
            {{- if .Values.config.pubsubEmulatorHost }}
            - name: PUBSUB_EMULATOR_HOST
              value: "{{ .Values.config.pubsubEmulatorHost }}"
            {{- end }}
            {{- if .Values.config.storageEmulatorHost }}
            - name: STORAGE_EMULATOR_HOST
              value: "{{ .Values.config.storageEmulatorHost }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
